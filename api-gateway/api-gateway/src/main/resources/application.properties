spring.application.name=api-gateway

server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# Account Service Route
spring.cloud.gateway.mvc.routes[0].id=account-service
spring.cloud.gateway.mvc.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/accounts/**

# Transaction Service Route
spring.cloud.gateway.mvc.routes[1].id=transaction-service
spring.cloud.gateway.mvc.routes[1].uri=lb://TRANSACTION-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/transactions/**